<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Prosperity Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'JetBrains Mono', monospace; background: #0a0e14; color: #b3b1ad; font-size: 13px; }

  /* Terminal top bar */
  .topbar { background: #0d1117; border-bottom: 1px solid #1a1f29; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-left h1 { color: #e6b450; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .topbar-left .dot { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .topbar-right { display: flex; gap: 10px; align-items: center; }
  .search { background: #0a0e14; border: 1px solid #1a1f29; border-radius: 3px; padding: 5px 10px; color: #b3b1ad; font-family: inherit; font-size: 12px; width: 200px; outline: none; }
  .search:focus { border-color: #e6b450; }
  .search::placeholder { color: #444b58; }
  .count { color: #444b58; font-size: 11px; }

  /* Filter bar */
  .filters { display: flex; gap: 6px; padding: 8px 24px; border-bottom: 1px solid #1a1f29; background: #0d1117; flex-wrap: wrap; }
  .pill { background: transparent; border: 1px solid #1a1f29; border-radius: 3px; padding: 3px 10px; font-size: 11px; color: #444b58; cursor: pointer; font-family: inherit; }
  .pill:hover { border-color: #444b58; color: #b3b1ad; }
  .pill.active { border-color: #e6b450; color: #e6b450; }

  /* Summary strip */
  .summary { display: flex; gap: 24px; padding: 12px 24px; border-bottom: 1px solid #1a1f29; background: #0d1117; }
  .summary-item { display: flex; gap: 6px; align-items: baseline; }
  .summary-item .label { color: #444b58; font-size: 10px; text-transform: uppercase; }
  .summary-item .value { font-size: 14px; font-weight: 700; }

  /* Content */
  .content { padding: 16px 24px; }

  /* Strategy cards (grouped) */
  .strat-card { border: 1px solid #1a1f29; border-radius: 4px; margin-bottom: 8px; background: #0d1117; overflow: hidden; }
  .strat-card.expanded { border-color: #1a1f29; }
  .strat-header { display: grid; grid-template-columns: 30px 1fr 120px 100px 80px 140px; align-items: center; padding: 12px 16px; cursor: pointer; transition: background 0.1s; gap: 12px; }
  .strat-header:hover { background: #111820; }
  .strat-rank { font-size: 11px; color: #444b58; text-align: center; }
  .strat-rank.r1 { color: #e6b450; font-weight: 700; }
  .strat-rank.r2 { color: #c0c0c0; font-weight: 600; }
  .strat-rank.r3 { color: #cd7f32; font-weight: 600; }
  .strat-info { display: flex; flex-direction: column; gap: 2px; }
  .strat-name { color: #e6b450; font-weight: 700; font-size: 14px; }
  .strat-meta { color: #444b58; font-size: 11px; }
  .strat-meta .author { color: #59c2ff; }
  .strat-pnl { text-align: right; font-weight: 700; font-size: 16px; }
  .strat-trades { text-align: right; color: #444b58; font-size: 12px; }
  .strat-time { text-align: right; color: #444b58; font-size: 11px; }

  /* Day breakdown in header */
  .strat-days { display: flex; gap: 8px; }
  .day-chip { background: #111820; border: 1px solid #1a1f29; border-radius: 3px; padding: 2px 8px; font-size: 10px; }
  .day-chip .day-label { color: #444b58; }
  .day-chip .day-pnl { margin-left: 4px; font-weight: 600; }

  /* Expanded detail */
  .strat-detail { display: none; border-top: 1px solid #1a1f29; padding: 16px; background: #0a0e14; }
  .strat-card.expanded .strat-detail { display: block; }

  /* Day tabs */
  .day-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid #1a1f29; }
  .day-tab { padding: 8px 16px; font-size: 12px; color: #444b58; cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit; background: transparent; border-top: none; border-left: none; border-right: none; }
  .day-tab:hover { color: #b3b1ad; }
  .day-tab.active { color: #e6b450; border-bottom-color: #e6b450; }

  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .chart-box { background: #0d1117; border: 1px solid #1a1f29; border-radius: 4px; padding: 12px; }
  .chart-box.wide { grid-column: 1 / -1; }
  .chart-box h3 { color: #444b58; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-family: inherit; }

  .stats { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .stat { }
  .stat-label { font-size: 10px; color: #444b58; text-transform: uppercase; }
  .stat-value { font-size: 14px; font-weight: 700; }

  .trades-box { background: #0d1117; border: 1px solid #1a1f29; border-radius: 4px; padding: 12px; max-height: 250px; overflow-y: auto; margin-bottom: 16px; }
  .trades-box h3 { color: #444b58; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .trades-box table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .trades-box th { text-align: left; padding: 4px 8px; color: #444b58; border-bottom: 1px solid #1a1f29; font-weight: 500; }
  .trades-box td { padding: 3px 8px; border-bottom: 1px solid #0d1117; }

  .code-box { background: #0d1117; border: 1px solid #1a1f29; border-radius: 4px; padding: 12px; }
  .code-box h3 { color: #444b58; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .code-box pre { color: #b3b1ad; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.6; overflow-x: auto; white-space: pre; max-height: 400px; overflow-y: auto; }
  .copy-btn { background: #1a1f29; border: 1px solid #2a303a; border-radius: 3px; color: #444b58; font-size: 10px; padding: 2px 8px; cursor: pointer; font-family: inherit; }
  .copy-btn:hover { color: #b3b1ad; }

  .pos { color: #91e05e; }
  .neg { color: #f07178; }
  .buy { color: #91e05e; }
  .sell { color: #f07178; }
  .empty { color: #444b58; text-align: center; padding: 60px; }
  .no-results { color: #444b58; text-align: center; padding: 40px; display: none; }

  @media (max-width: 900px) {
    .strat-header { grid-template-columns: 30px 1fr 100px 80px; }
    .strat-days, .strat-time { display: none; }
    .charts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="dot"></span>
    <h1>Prosperity Terminal</h1>
  </div>
  <div class="topbar-right">
    <span class="count" id="run-count"></span>
    <input class="search" id="search" type="text" placeholder="filter...">
  </div>
</div>

<div class="filters" id="filters"></div>
<div class="summary" id="summary"></div>

<div class="content">
  <div class="no-results" id="no-results">No matching submissions.</div>
  <div id="cards"></div>
</div>

<script>
const BASE = './runs';
let RUNS = [];
let groups = [];
let filteredGroups = [];
const allCharts = {};
let activeFilters = { author: null, strategy: null };

function pc(v) { return v >= 0 ? 'pos' : 'neg'; }
function fp(v) { return (v >= 0 ? '+' : '') + v.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1}); }

async function init() {
  try {
    const res = await fetch('./results.json');
    if (!res.ok) throw new Error();
    RUNS = await res.json();
  } catch {
    document.getElementById('cards').innerHTML = '<div class="empty">No submissions yet. Push a strategy to get started.</div>';
    return;
  }

  // Group by (author, strategy, commit)
  const gmap = {};
  for (const r of RUNS) {
    const key = `${r.author}|${r.strategy}|${r.commit}`;
    if (!gmap[key]) gmap[key] = { author: r.author, strategy: r.strategy, commit: r.commit, timestamp: r.timestamp, runs: [] };
    gmap[key].runs.push(r);
  }
  groups = Object.values(gmap);

  // For each group, compute totals
  for (const g of groups) {
    const sub = g.runs.find(r => String(r.dataset).includes('submission'));
    g.submission_pnl = sub ? sub.pnl : null;
    g.total_pnl = g.runs.reduce((s, r) => s + (r.pnl || 0), 0);
    g.total_trades = g.runs.reduce((s, r) => s + (r.trades || 0), 0);
    // Merge products
    g.pnl_by_product = {};
    for (const r of g.runs) {
      if (r.dataset && String(r.dataset).includes('submission')) {
        g.pnl_by_product = r.pnl_by_product || {};
      }
    }
  }

  // Filters
  const authors = [...new Set(groups.map(g => g.author))];
  const strategies = [...new Set(groups.map(g => g.strategy))];
  const fd = document.getElementById('filters');
  const addPills = (vals, key) => vals.forEach(v => {
    const p = document.createElement('span');
    p.className = 'pill';
    p.textContent = v;
    p.onclick = () => {
      if (activeFilters[key] === v) { activeFilters[key] = null; p.classList.remove('active'); }
      else { fd.querySelectorAll('.pill').forEach(x => { if (x.textContent === activeFilters[key]) x.classList.remove('active'); }); activeFilters[key] = v; p.classList.add('active'); }
      applyFilters();
    };
    fd.appendChild(p);
  });
  if (authors.length > 1) addPills(authors, 'author');
  if (strategies.length > 1) addPills(strategies, 'strategy');

  document.getElementById('search').addEventListener('input', applyFilters);
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filteredGroups = groups.filter(g => {
    if (activeFilters.author && g.author !== activeFilters.author) return false;
    if (activeFilters.strategy && g.strategy !== activeFilters.strategy) return false;
    if (q && !(g.author.toLowerCase().includes(q) || g.strategy.toLowerCase().includes(q) || (g.commit||'').toLowerCase().includes(q))) return false;
    return true;
  });
  // Sort by submission PnL desc
  filteredGroups.sort((a, b) => (b.submission_pnl || b.total_pnl) - (a.submission_pnl || a.total_pnl));
  render();
}

function render() {
  // Summary
  const sd = document.getElementById('summary');
  if (filteredGroups.length > 0) {
    const bestSub = Math.max(...filteredGroups.map(g => g.submission_pnl || 0));
    const avgSub = filteredGroups.filter(g => g.submission_pnl != null).reduce((s, g) => s + g.submission_pnl, 0) / (filteredGroups.filter(g => g.submission_pnl != null).length || 1);
    const uAuthors = new Set(filteredGroups.map(g => g.author)).size;
    sd.innerHTML = `
      <div class="summary-item"><span class="label">Best Sub</span><span class="value pos">${fp(bestSub)}</span></div>
      <div class="summary-item"><span class="label">Avg Sub</span><span class="value ${pc(avgSub)}">${fp(avgSub)}</span></div>
      <div class="summary-item"><span class="label">Strategies</span><span class="value">${filteredGroups.length}</span></div>
      <div class="summary-item"><span class="label">Authors</span><span class="value">${uAuthors}</span></div>
    `;
  } else { sd.innerHTML = ''; }

  document.getElementById('run-count').textContent = `${filteredGroups.length} strategies`;
  document.getElementById('no-results').style.display = filteredGroups.length === 0 ? 'block' : 'none';

  // Cards
  const cd = document.getElementById('cards');
  // Destroy old charts
  Object.values(allCharts).flat().forEach(c => c.destroy());
  for (const k in allCharts) delete allCharts[k];
  cd.innerHTML = '';

  filteredGroups.forEach((g, gi) => {
    const rank = gi + 1;
    const rc = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
    const pnl = g.submission_pnl != null ? g.submission_pnl : g.total_pnl;
    const time = g.timestamp ? new Date(g.timestamp).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

    const card = document.createElement('div');
    card.className = 'strat-card';
    card.id = `card-${gi}`;

    // Day chips
    const dayChips = g.runs.map(r => {
      const label = String(r.dataset).includes('submission') ? 'SUB' : `D${r.day}`;
      return `<span class="day-chip"><span class="day-label">${label}</span><span class="day-pnl ${pc(r.pnl)}">${fp(r.pnl)}</span></span>`;
    }).join('');

    card.innerHTML = `
      <div class="strat-header" onclick="toggleCard(${gi})">
        <div class="strat-rank ${rc}">#${rank}</div>
        <div class="strat-info">
          <div class="strat-name">${g.strategy}</div>
          <div class="strat-meta"><span class="author">${g.author}</span> &middot; ${g.commit || '?'}</div>
        </div>
        <div class="strat-pnl ${pc(pnl)}">${fp(pnl)}</div>
        <div class="strat-days">${dayChips}</div>
        <div class="strat-trades">${g.total_trades} trades</div>
        <div class="strat-time">${time}</div>
      </div>
      <div class="strat-detail" id="detail-${gi}"></div>
    `;
    cd.appendChild(card);
  });
}

async function toggleCard(gi) {
  const card = document.getElementById(`card-${gi}`);
  const detail = document.getElementById(`detail-${gi}`);

  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
    (allCharts[gi] || []).forEach(c => c.destroy());
    allCharts[gi] = [];
    detail.innerHTML = '';
    return;
  }

  card.classList.add('expanded');
  detail.innerHTML = '<span style="color:#444b58">Loading...</span>';
  allCharts[gi] = [];

  const g = filteredGroups[gi];

  // Load data for all runs
  const runData = await Promise.all(g.runs.map(async r => ({
    ...r,
    pnlCsv: await fetchCsv(`${BASE}/${r.id}/pnl_by_product.csv`),
    trades: await fetchCsv(`${BASE}/${r.id}/trades.csv`),
  })));
  const strategyCode = await fetchText(`${BASE}/${g.runs[0].id}/strategy.py`);

  detail.innerHTML = '';

  // Day tabs
  const tabBar = document.createElement('div');
  tabBar.className = 'day-tabs';
  runData.forEach((r, ri) => {
    const label = String(r.dataset).includes('submission') ? 'Submission' : `Day ${r.day}`;
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (ri === 0 ? ' active' : '');
    tab.textContent = `${label}  ${fp(r.pnl)}`;
    tab.onclick = e => {
      e.stopPropagation();
      tabBar.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      detail.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`panel-${gi}-${ri}`).classList.add('active');
    };
    tabBar.appendChild(tab);
  });
  detail.appendChild(tabBar);

  // Day panels
  runData.forEach((r, ri) => {
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (ri === 0 ? ' active' : '');
    panel.id = `panel-${gi}-${ri}`;

    // Stats
    const prods = Object.entries(r.pnl_by_product || {}).map(([k,v]) => `<div class="stat"><div class="stat-label">${k}</div><div class="stat-value ${pc(v)}">${fp(v)}</div></div>`).join('');
    panel.innerHTML = `<div class="stats">
      <div class="stat"><div class="stat-label">PnL</div><div class="stat-value ${pc(r.pnl)}">${fp(r.pnl)}</div></div>
      <div class="stat"><div class="stat-label">Trades</div><div class="stat-value">${r.own_trade_count || r.trades_count || r.trades?.length || '?'}</div></div>
      <div class="stat"><div class="stat-label">Ticks</div><div class="stat-value">${(r.ticks||0).toLocaleString()}</div></div>
      ${prods}
    </div>`;

    // PnL chart
    if (r.pnlCsv.length > 0) {
      const chartsDiv = document.createElement('div');
      chartsDiv.className = 'charts';
      const box = mkChart('Cumulative PnL', true);
      chartsDiv.appendChild(box);
      panel.appendChild(chartsDiv);

      const products = Object.keys(r.pnlCsv[0]).filter(k => k !== 'timestamp' && k !== 'total');
      const sampled = downsample(r.pnlCsv, 400);
      const colors = ['#59c2ff', '#91e05e', '#e6b450', '#d2a6ff', '#f07178', '#95e6cb'];
      setTimeout(() => {
        const chart = new Chart(box.querySelector('canvas'), {
          type: 'line',
          data: { datasets: [
            { label: 'Total', data: sampled.map(x => ({x:+x.timestamp,y:+x.total})), borderColor: '#b3b1ad', borderWidth: 2, pointRadius: 0, tension: 0.1 },
            ...products.map((p,i) => ({ label: p, data: sampled.map(x => ({x:+x.timestamp,y:+(x[p]||0)})), borderColor: colors[i%colors.length], borderWidth: 1.5, pointRadius: 0, tension: 0.1 })),
          ]},
          options: chartOpts(),
        });
        allCharts[gi].push(chart);
      }, 50);
    }

    // Trades
    if (r.trades && r.trades.length > 0) {
      const tb = document.createElement('div');
      tb.className = 'trades-box';
      tb.innerHTML = `<h3>Trades (${r.trades.length})</h3>
        <table><thead><tr><th>Tick</th><th>Symbol</th><th>Side</th><th>Price</th><th>Qty</th></tr></thead>
        <tbody>${r.trades.map(t => {
          const isBuy = t.buyer === 'SUBMISSION';
          return `<tr><td>${t.timestamp}</td><td>${t.symbol}</td><td class="${isBuy?'buy':'sell'}">${isBuy?'BUY':'SELL'}</td><td>${t.price}</td><td>${t.quantity}</td></tr>`;
        }).join('')}</tbody></table>`;
      panel.appendChild(tb);
    }

    detail.appendChild(panel);
  });

  // Strategy code (shared across days)
  if (strategyCode) {
    const box = document.createElement('div');
    box.className = 'code-box';
    const escaped = strategyCode.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const cid = `copy-${gi}`;
    box.innerHTML = `<h3><span>${g.strategy}.py</span><button class="copy-btn" id="${cid}">Copy</button></h3><pre>${escaped}</pre>`;
    detail.appendChild(box);
    document.getElementById(cid).addEventListener('click', e => {
      e.stopPropagation();
      navigator.clipboard.writeText(strategyCode);
      e.target.textContent = 'Copied!';
      setTimeout(() => e.target.textContent = 'Copy', 1500);
    });
  }
}

function mkChart(title, wide) {
  const b = document.createElement('div');
  b.className = 'chart-box' + (wide ? ' wide' : '');
  b.innerHTML = `<h3>${title}</h3><canvas></canvas>`;
  return b;
}
function chartOpts() {
  return {
    responsive: true,
    plugins: { legend: { labels: { color: '#444b58', font: { size: 10, family: 'JetBrains Mono' } } } },
    scales: {
      x: { type: 'linear', grid: { color: '#1a1f29' }, ticks: { color: '#444b58', maxTicksLimit: 8, font: { size: 10 } } },
      y: { grid: { color: '#1a1f29' }, ticks: { color: '#444b58', font: { size: 10 } } },
    },
    interaction: { intersect: false, mode: 'index' },
  };
}
function downsample(d, max) { if (d.length <= max) return d; const s = Math.floor(d.length/max); return d.filter((_,i) => i%s===0 || i===d.length-1); }
async function fetchText(u) { try { const r = await fetch(u); return r.ok ? await r.text() : null; } catch { return null; } }
async function fetchCsv(u) {
  try { const r = await fetch(u); if (!r.ok) return []; const t = await r.text(); const l = t.trim().split('\n'); if (l.length<2) return []; const h = l[0].split(';'); return l.slice(1).map(x => { const v=x.split(';'); const o={}; h.forEach((k,i) => o[k]=v[i]||''); return o; }); } catch { return []; }
}

init();
</script>
</body>
</html>
