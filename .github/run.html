<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Run — Prosperity</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./shared.css">
<style>
  :root {
    --surf-card:#ffffff;       --surf-card-border:#e5e7eb;
    --surf-detail:#ffffff;
    --surf-stats:#ffffff;      --surf-stats-border:#e5e7eb;
    --surf-chart:#ffffff;      --surf-chart-border:#e5e7eb;
    --surf-trades:#ffffff;     --surf-trades-border:#e5e7eb;
    --surf-code:#ffffff;       --surf-code-border:#e5e7eb;
    --surf-code-pre:#1e293b;   --surf-code-pre-text:#cbd5e1;
  }

  .content{padding:18px 24px 40px;max-width:1400px;margin:0 auto}

  .run-head{background:var(--surf-card);border:1px solid var(--surf-card-border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:var(--shadow-sm)}
  .back-link{color:var(--text-muted);text-decoration:none;font-size:12px;font-weight:500;padding:6px 10px;border:1px solid var(--border-subtle);border-radius:6px;transition:all .15s}
  .back-link:hover{color:var(--text-primary);border-color:var(--border-strong);background:var(--bg-hover)}
  .run-title{display:flex;flex-direction:column;gap:3px;flex:1;min-width:200px}
  .run-strat{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-.3px}
  .run-meta{color:var(--text-muted);font-size:12px;display:flex;gap:12px;flex-wrap:wrap}
  .run-meta b{color:var(--text-secondary);font-weight:500}

  .day-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 18px;background:var(--surf-detail);border-radius:var(--radius) var(--radius) 0 0}
  .day-tab{padding:12px 16px;font-size:12px;color:var(--text-muted);cursor:pointer;border:none;border-bottom:2px solid transparent;font-family:inherit;background:transparent;transition:all .15s;font-weight:500;margin-bottom:-1px}
  .day-tab:hover{color:var(--text-secondary)}
  .day-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .day-panel{display:none;padding:20px 18px;background:var(--surf-detail);border-radius:0 0 var(--radius) var(--radius)}
  .day-panel.active{display:block}
  .panels-wrap{margin-bottom:14px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;margin-bottom:18px;padding:14px 16px;background:var(--surf-stats);border:1px solid var(--surf-stats-border);border-radius:8px}
  .stats>div{display:flex;flex-direction:column;gap:2px}
  .stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .stat-value{font-family:var(--mono);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.2px}

  .charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .chart-box{background:var(--surf-chart);border:1px solid var(--surf-chart-border);border-radius:8px;padding:14px}
  .chart-box.wide{grid-column:1/-1}
  .chart-box h3{color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;font-weight:600}

  .trades-box{background:var(--surf-trades);border:1px solid var(--surf-trades-border);border-radius:8px;padding:14px;margin-bottom:16px}
  .trades-box>h3{color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .trades-filter{display:flex;gap:4px;flex-wrap:wrap}
  .trades-filter button{background:var(--bg-surface);border:1px solid var(--border);color:var(--text-secondary);font-size:10px;font-family:inherit;padding:3px 9px;border-radius:999px;cursor:pointer;font-weight:500;letter-spacing:.2px;text-transform:none}
  .trades-filter button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .trades-list{max-height:520px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:4px}
  .tick-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:8px;padding:10px 12px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}
  .tick-meta{display:flex;flex-direction:column;gap:4px;min-width:180px;font-size:11px}
  .tick-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);color:var(--text-muted);font-weight:500;font-size:10.5px;letter-spacing:.2px}
  .tick-tag b{color:var(--text-secondary);font-weight:600}
  .tick-sym{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text-primary);letter-spacing:-.2px}
  .tick-fills{display:flex;flex-direction:column;gap:3px}
  .fill-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-variant-numeric:tabular-nums}
  .fill-pill .side{font-weight:700;font-size:9.5px;padding:1px 6px;border-radius:3px;letter-spacing:.5px}
  .fill-pill .side.buy{background:rgba(16,185,129,.14);color:#047857}
  .fill-pill .side.sell{background:rgba(239,68,68,.14);color:#b91c1c}
  .book{display:grid;grid-template-columns:1fr auto 1fr;gap:0;font-family:var(--mono);font-size:10.5px;font-variant-numeric:tabular-nums;border-radius:6px;overflow:hidden;border:1px solid var(--border-subtle)}
  .book-col{display:flex;flex-direction:column}
  .book-col.asks{background:linear-gradient(180deg,rgba(239,68,68,.08),rgba(239,68,68,.02))}
  .book-col.bids{background:linear-gradient(0deg,rgba(16,185,129,.08),rgba(16,185,129,.02))}
  .book-row{display:grid;grid-template-columns:1fr 1fr;padding:3px 8px;border-bottom:1px solid var(--border-subtle);gap:6px}
  .book-row:last-child{border-bottom:none}
  .book-col.asks .book-row{color:#b91c1c}
  .book-col.bids .book-row{color:#047857}
  .book-row.empty{color:var(--text-muted);opacity:.4}
  .book-row.hit{background:var(--accent-soft);color:var(--accent-dim);font-weight:700;box-shadow:inset 2px 0 0 var(--accent)}
  .book-mid{display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--bg-raised);padding:0 10px;font-weight:600;color:var(--text-secondary);border-left:1px solid var(--border-subtle);border-right:1px solid var(--border-subtle)}
  .book-mid .mid-label{font-size:8.5px;color:var(--text-muted);font-weight:500;letter-spacing:.4px;text-transform:uppercase}
  .book-mid .mid-value{font-size:11px}
  .book-vol{color:var(--text-muted);font-weight:400;text-align:right}
  .book-price{text-align:left}
  .no-book{color:var(--text-muted);font-size:10.5px;font-style:italic;padding:6px 10px;background:var(--bg-raised);border-radius:4px;border:1px dashed var(--border)}
  @media(max-width:720px){
    .tick-card{grid-template-columns:1fr;gap:8px}
    .tick-meta{min-width:0}
  }

  .code-box{background:var(--surf-code);border:1px solid var(--surf-code-border);border-radius:8px;overflow:hidden}
  .code-box h3{color:var(--text-muted);font-size:11px;margin:0;padding:10px 14px;border-bottom:1px solid var(--surf-code-border);display:flex;justify-content:space-between;align-items:center;font-weight:600;font-family:var(--mono)}
  .code-box pre{color:var(--surf-code-pre-text);font-family:var(--mono);font-size:11.5px;line-height:1.65;overflow-x:auto;white-space:pre;max-height:440px;overflow-y:auto;padding:14px;background:var(--surf-code-pre)}
  .copy-btn{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);font-size:10px;padding:3px 10px;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
  .copy-btn:hover{color:var(--text-primary);border-color:var(--border-strong);background:var(--bg-hover)}

  .loading{color:var(--text-muted);padding:60px 20px;text-align:center}

  @media(max-width:900px){
    .topbar{padding:0 16px;height:48px}
    .content{padding:14px 16px 40px}
    .charts{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="logo" href="./index.html">
      <img src="./billiken-logo.jpg" alt="SLU" class="logo-img">
      <h1><span>Prosperity</span></h1>
    </a>
    <nav class="nav">
      <a class="nav-link active" href="./index.html">Traders</a>
      <a class="nav-link" href="./discord-intel.html">Discord Bot</a>
    </nav>
  </div>
</div>

<div class="content" id="root">
  <div class="loading">Loading…</div>
</div>

<script src="./shared.js"></script>
<script>
const BASE='./runs';

function mkChart(t,w){const b=document.createElement('div');b.className='chart-box'+(w?' wide':'');b.innerHTML=`<h3>${t}</h3><canvas></canvas>`;return b}
function co(){return{responsive:true,animation:false,plugins:{legend:{labels:{color:'#6b7280',font:{size:10,family:'Inter'}}}},scales:{x:{type:'linear',grid:{color:'#e5e7eb'},ticks:{color:'#9ca3af',maxTicksLimit:8,font:{size:10}}},y:{grid:{color:'#e5e7eb'},ticks:{color:'#9ca3af',font:{size:10}}}},interaction:{intersect:false,mode:'index'}}}
function ds(d,m){if(d.length<=m)return d;const s=Math.floor(d.length/m);return d.filter((_,i)=>i%s===0||i===d.length-1)}

function buildBookIndex(rows){
  const idx={};
  for(const r of rows){
    const k=`${r.timestamp}|${r.product}`;
    const bids=[],asks=[];
    for(let i=1;i<=3;i++){
      const bp=r[`bid_price_${i}`],bv=r[`bid_volume_${i}`];
      if(bp)bids.push({p:+bp,v:+bv});
      const ap=r[`ask_price_${i}`],av=r[`ask_volume_${i}`];
      if(ap)asks.push({p:+ap,v:+av});
    }
    bids.sort((a,b)=>b.p-a.p);
    asks.sort((a,b)=>a.p-b.p);
    idx[k]={bids,asks,mid:r.mid_price?+r.mid_price:null};
  }
  return idx;
}

function groupTradesByTick(trades){
  const m=new Map();
  for(const t of trades){
    const k=`${t.timestamp}|${t.symbol}`;
    if(!m.has(k))m.set(k,{timestamp:+t.timestamp,symbol:t.symbol,fills:[]});
    const isBuy=t.buyer==='SUBMISSION';
    m.get(k).fills.push({side:isBuy?'BUY':'SELL',price:+t.price,qty:+t.quantity});
  }
  return [...m.values()].sort((a,b)=>a.timestamp-b.timestamp);
}

function renderTickCard(g,bookIdx){
  const card=document.createElement('div');card.className='tick-card';
  const book=bookIdx[`${g.timestamp}|${g.symbol}`];
  const fillPrices=new Set(g.fills.map(f=>f.price));

  const fillsHtml=g.fills.map(f=>`<span class="fill-pill"><span class="side ${f.side.toLowerCase()}">${f.side}</span>${f.qty} @ ${f.price.toLocaleString()}</span>`).join('');
  const meta=document.createElement('div');meta.className='tick-meta';
  meta.innerHTML=`<span class="tick-tag">tick <b>${g.timestamp.toLocaleString()}</b></span><span class="tick-sym">${g.symbol}</span><div class="tick-fills">${fillsHtml}</div>`;
  card.appendChild(meta);

  if(!book||(!book.bids.length&&!book.asks.length)){
    const nb=document.createElement('div');nb.className='no-book';nb.textContent='order book unavailable';card.appendChild(nb);return card;
  }

  const mkRow=(lvl,hit)=>lvl?`<div class="book-row${hit?' hit':''}"><span class="book-price">${lvl.p.toLocaleString()}</span><span class="book-vol">×${lvl.v}</span></div>`:`<div class="book-row empty"><span class="book-price">—</span><span class="book-vol"></span></div>`;
  const asksDesc=[book.asks[2],book.asks[1],book.asks[0]];
  const bidsDesc=[book.bids[0],book.bids[1],book.bids[2]];
  const bookEl=document.createElement('div');bookEl.className='book';
  bookEl.innerHTML=`
    <div class="book-col asks">${asksDesc.map(l=>mkRow(l,l&&fillPrices.has(l.p))).join('')}</div>
    <div class="book-mid"><span class="mid-label">mid</span><span class="mid-value">${book.mid!=null?book.mid.toLocaleString():'—'}</span></div>
    <div class="book-col bids">${bidsDesc.map(l=>mkRow(l,l&&fillPrices.has(l.p))).join('')}</div>
  `;
  card.appendChild(bookEl);
  return card;
}

async function init(){
  const root=document.getElementById('root');
  const params=new URLSearchParams(location.search);
  const key=params.get('g');
  if(!key){root.innerHTML='<div class="loading">Missing ?g=&lt;author|strategy|commit&gt;</div>';return}

  const manifest=await fetch('./results.json',{cache:'no-cache'}).then(r=>r.json()).catch(()=>null);
  if(!manifest){root.innerHTML='<div class="loading">Failed to load manifest</div>';return}

  const [author,strategy,commit]=key.split('|');
  const runs=manifest.filter(r=>r.author===author&&r.strategy===strategy&&r.commit===commit);
  if(!runs.length){root.innerHTML='<div class="loading">Run not found</div>';return}

  document.title=`${strategy} — Prosperity`;

  const total=runs.reduce((s,r)=>s+(r.pnl||0),0);
  const avg=runs.length?total/runs.length:0;
  const sub=runs.find(r=>String(r.dataset).includes('submission'));
  const subPnl=sub?sub.pnl:avg;
  const time=runs[0].timestamp?new Date(runs[0].timestamp).toLocaleString():'';

  root.innerHTML='';
  const head=document.createElement('div');head.className='run-head';
  head.innerHTML=`
    <a class="back-link" href="./index.html">← Back</a>
    <div class="run-title">
      <div class="run-strat">${strategy}</div>
      <div class="run-meta"><span>by <b>${author}</b></span><span>commit <b>${commit}</b></span><span>${time}</span></div>
    </div>
    <div style="text-align:right">
      <div class="stat-label">Avg PnL / day</div>
      <div style="font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:-.4px" class="${pc(subPnl)}">${fp(subPnl)}</div>
    </div>
  `;
  root.appendChild(head);

  const wrap=document.createElement('div');wrap.className='panels-wrap';
  const tabs=document.createElement('div');tabs.className='day-tabs';
  const panels=document.createElement('div');

  const runData=await Promise.all(runs.map(async r=>({
    ...r,
    pnlCsv:await fetchCsv(`${BASE}/${r.id}/pnl_by_product.csv`),
    tradesCsv:await fetchCsv(`${BASE}/${r.id}/trades.csv`),
    actCsv:await fetchCsv(`${BASE}/${r.id}/activity.csv`),
  })));

  const charts=[];
  runData.forEach((r,ri)=>{
    const lbl=String(r.dataset).includes('submission')?'Submission':`Day ${r.day}`;
    const t=document.createElement('button');t.className='day-tab'+(ri===0?' active':'');
    t.innerHTML=`${lbl} <span class="${pc(r.pnl)}" style="margin-left:6px;font-family:var(--mono);font-weight:600;font-size:11px">${fp(r.pnl)}</span>`;
    t.onclick=()=>{
      tabs.querySelectorAll('.day-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
      panels.querySelectorAll('.day-panel').forEach(x=>x.classList.remove('active'));document.getElementById(`p-${ri}`).classList.add('active');
    };
    tabs.appendChild(t);

    const p=document.createElement('div');p.className='day-panel'+(ri===0?' active':'');p.id=`p-${ri}`;
    const prods=Object.entries(r.pnl_by_product||{}).map(([k,v])=>`<div><span class="stat-label">${k}</span><div class="stat-value ${pc(v)}">${fp(v)}</div></div>`).join('');
    p.innerHTML=`<div class="stats"><div><span class="stat-label">PnL</span><div class="stat-value ${pc(r.pnl)}">${fp(r.pnl)}</div></div><div><span class="stat-label">Trades</span><div class="stat-value">${r.trades||'?'}</div></div><div><span class="stat-label">Ticks</span><div class="stat-value">${(r.ticks||0).toLocaleString()}</div></div>${prods}</div>`;

    if(r.pnlCsv.length>0){
      const cd=document.createElement('div');cd.className='charts';
      const box=mkChart('Cumulative PnL',true);cd.appendChild(box);p.appendChild(cd);
      const products=Object.keys(r.pnlCsv[0]).filter(k=>k!=='timestamp'&&k!=='total');
      const sam=ds(r.pnlCsv,400);
      const colors=['#2563eb','#059669','#d97706','#7c3aed','#dc2626','#0891b2'];
      setTimeout(()=>{charts.push(new Chart(box.querySelector('canvas'),{type:'line',
        data:{datasets:[{label:'Total',data:sam.map(x=>({x:+x.timestamp,y:+x.total})),borderColor:'#111827',borderWidth:2,pointRadius:0,tension:.1},
          ...products.map((q,i)=>({label:q,data:sam.map(x=>({x:+x.timestamp,y:+(x[q]||0)})),borderColor:colors[i%colors.length],borderWidth:1.5,pointRadius:0,tension:.1}))]},
        options:co()}))},50);
    }

    if(r.tradesCsv&&r.tradesCsv.length>0){
      const tb=document.createElement('div');tb.className='trades-box';
      const botTrades=r.tradesCsv.filter(t=>t.buyer==='SUBMISSION'||t.seller==='SUBMISSION');
      const book=buildBookIndex(r.actCsv||[]);
      const groups=groupTradesByTick(botTrades);
      const symbols=[...new Set(botTrades.map(t=>t.symbol))].sort();

      tb.innerHTML=`<h3><span>Trades (${botTrades.length})</span><span class="trades-filter" id="tf-${ri}"><button class="active" data-sym="">All</button>${symbols.map(s=>`<button data-sym="${s}">${s}</button>`).join('')}</span></h3><div class="trades-list" id="tl-${ri}"></div>`;
      p.appendChild(tb);

      const listEl=tb.querySelector(`#tl-${ri}`);
      const renderList=filter=>{
        listEl.innerHTML='';
        const shown=filter?groups.filter(g=>g.symbol===filter):groups;
        shown.slice(0,500).forEach(g=>listEl.appendChild(renderTickCard(g,book)));
        if(shown.length>500){
          const m=document.createElement('div');m.className='no-book';m.textContent=`Showing first 500 of ${shown.length} tick-groups`;listEl.appendChild(m);
        }
      };
      renderList('');
      tb.querySelector(`#tf-${ri}`).addEventListener('click',e=>{
        if(e.target.tagName!=='BUTTON')return;
        tb.querySelectorAll(`#tf-${ri} button`).forEach(b=>b.classList.remove('active'));
        e.target.classList.add('active');
        renderList(e.target.dataset.sym);
      });
    }
    panels.appendChild(p);
  });

  wrap.appendChild(tabs);wrap.appendChild(panels);
  root.appendChild(wrap);

  const code=await fetchText(`${BASE}/${runs[0].id}/strategy.py`);
  if(code){
    const box=document.createElement('div');box.className='code-box';
    const esc=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    box.innerHTML=`<h3><span>${strategy}.py</span><button class="copy-btn" id="copy-btn">Copy</button></h3><pre>${esc}</pre>`;
    root.appendChild(box);
    document.getElementById('copy-btn').addEventListener('click',e=>{navigator.clipboard.writeText(code);e.target.textContent='Copied!';setTimeout(()=>e.target.textContent='Copy',1500)});
  }
}

init();
</script>
</body>
</html>
