name: Backtest & Deploy Results

on:
  push:
    paths:
      - 'strategies/**'
      - 'datasets_extra/**'
      - 'scripts/imcbt_wrapper.py'
      - '.github/dashboard.html'
      - '.github/discord-intel.html'
      - '.github/manual-trading.html'
      - '.github/run.html'
      - '.github/round5.html'
      - '.github/build_round5_data.py'
      - '.github/shared.css'
      - '.github/shared.js'
      - '.github/collect_results.py'
      - '.github/workflows/backtest.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

# Only keep the latest run per branch; supersede in-flight runs on rapid pushes.
concurrency:
  group: backtest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 2

      - name: Detect changed strategies
        id: changes
        run: |
          # Strategies: run only if .py under strategies/** changed.
          # Backtester submodule or collection script changed: re-run ALL
          # strategies since behavior may have shifted.
          # Manual workflow_dispatch: run ALL strategies.
          STRAT_DIFF=$(git diff --name-only HEAD~1 HEAD -- 'strategies/**/*.py' 2>/dev/null || true)
          BEHAVIOR_DIFF=$(git diff --name-only HEAD~1 HEAD -- 'datasets_extra/' 'scripts/imcbt_wrapper.py' '.github/collect_results.py' '.github/workflows/backtest.yml' 2>/dev/null || true)

          if [ -n "$STRAT_DIFF" ]; then
            CHANGED="$STRAT_DIFF"
            echo "Strategy files changed; running them"
          elif [ -n "$BEHAVIOR_DIFF" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED=$(find strategies -name '*.py' -not -path '*/lib/*' 2>/dev/null || true)
            echo "Backtester / data / script changed (or manual dispatch); running ALL strategies"
          else
            CHANGED=""
            echo "No strategy or backtester-behavior changes detected; skipping backtests"
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Python
        if: steps.changes.outputs.files != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install imc-p4-bt
        if: steps.changes.outputs.files != ''
        run: pip install imc-p4-bt

      - name: Fetch existing manifest from gh-pages
        if: steps.changes.outputs.files != ''
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          git show origin/gh-pages:results.json > existing-manifest.json 2>/dev/null || echo "[]" > existing-manifest.json

      - name: Run backtests
        if: steps.changes.outputs.files != ''
        env:
          STRATEGIES: ${{ steps.changes.outputs.files }}
          AUTHOR: ${{ github.actor }}
          COMMIT: ${{ github.sha }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          REPO_ROOT: ${{ github.workspace }}
          EXISTING_MANIFEST: ${{ github.workspace }}/existing-manifest.json
        run: python3 .github/collect_results.py

      - name: Deploy to gh-pages
        run: |
          RESULTS_DIR="${{ github.workspace }}/backtest-results"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          DEPLOY_DIR=$(mktemp -d)

          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git archive gh-pages | tar -x -C "$DEPLOY_DIR"
          fi

          mkdir -p "$DEPLOY_DIR/runs"

          # Copy new run data
          if [ -d "$RESULTS_DIR" ]; then
            for RUN_DIR in "$RESULTS_DIR"/*/; do
              [ -d "$RUN_DIR" ] || continue
              RUN_NAME=$(basename "$RUN_DIR")
              cp -r "$RUN_DIR" "$DEPLOY_DIR/runs/$RUN_NAME"
            done
          fi

          # Merge manifests (dedup by author+strategy+dataset+day, keep newest)
          # and prune orphan run dirs whose id is no longer referenced.
          python3 -c "
          import json, os, shutil
          deploy = '$DEPLOY_DIR'
          results = '$RESULTS_DIR'
          manifest_path = os.path.join(deploy, 'results.json')
          existing = []
          if os.path.exists(manifest_path):
              with open(manifest_path) as f:
                  existing = json.load(f)
          new_path = os.path.join(results, 'new_results.json')
          if os.path.exists(new_path):
              with open(new_path) as f:
                  new = json.load(f)
              existing = new + existing
          # One-time cleanup: drop the transient 'round4_data' dataset rows
          # produced by an early wrapper iteration. The wrapper now writes
          # per-day prices_round_4_day_N.csv names matching rust_backtester
          # convention, so these stale rows are superseded.
          existing = [r for r in existing if r.get('dataset') != 'round4_data']
          # Deduplicate: keep first (newest) per (author, strategy, dataset, day)
          seen = set()
          deduped = []
          for r in existing:
              key = (r.get('author',''), r.get('strategy',''), r.get('dataset',''), str(r.get('day','')))
              if key not in seen:
                  seen.add(key)
                  deduped.append(r)
          # Determine which submission.log files to retain: N most recent
          # runs per author. Older runs get stubbed so gh-pages stays
          # bounded. The 'Open in visualizer' link in run.html only renders
          # for entries flagged has_log=true.
          N_PER_AUTHOR = 10
          runs_by_author = {}
          for r in deduped:
              runs_by_author.setdefault(r.get('author',''), []).append(r)
          keep_ids = set()
          for author, rs in runs_by_author.items():
              rs.sort(key=lambda r: r.get('timestamp',''), reverse=True)
              for r in rs[:N_PER_AUTHOR]:
                  if r.get('id'):
                      keep_ids.add(r['id'])
          for r in deduped:
              r['has_log'] = r.get('id','') in keep_ids
          with open(manifest_path, 'w') as f:
              json.dump(deduped, f, indent=2)
          # Prune orphan run directories
          live_ids = {r.get('id','') for r in deduped if r.get('id')}
          runs_root = os.path.join(deploy, 'runs')
          pruned = 0
          if os.path.isdir(runs_root):
              for name in os.listdir(runs_root):
                  p = os.path.join(runs_root, name)
                  if os.path.isdir(p) and name not in live_ids:
                      shutil.rmtree(p, ignore_errors=True)
                      pruned += 1
          # Stub older logs (anything not in keep_ids whose log is real-sized)
          stubbed = 0
          if os.path.isdir(runs_root):
              for name in os.listdir(runs_root):
                  if name in keep_ids:
                      continue
                  log_file = os.path.join(runs_root, name, 'submission.log')
                  if not os.path.isfile(log_file):
                      continue
                  try:
                      size = os.path.getsize(log_file)
                  except OSError:
                      continue
                  if size <= 4096:
                      continue  # already a stub
                  with open(log_file, 'w') as f:
                      f.write(f'# stub: real log retained only for {N_PER_AUTHOR} most recent runs per author\\n')
                      f.write(f'# original size was {size} bytes\\n')
                  stubbed += 1
          print(f'Manifest: {len(deduped)} submissions ({len(existing) - len(deduped)} duplicates removed, {pruned} orphan run dirs pruned, {stubbed} older logs stubbed; {len(keep_ids)} retained)')
          "

          # Copy dashboard
          cp .github/dashboard.html "$DEPLOY_DIR/index.html"
          cp .github/discord-intel.html "$DEPLOY_DIR/discord-intel.html"
          cp .github/manual-trading.html "$DEPLOY_DIR/manual-trading.html"
          cp .github/run.html "$DEPLOY_DIR/run.html"
          cp .github/round5.html "$DEPLOY_DIR/round5.html"
          cp .github/billiken-logo.jpg "$DEPLOY_DIR/billiken-logo.jpg" 2>/dev/null || true
          # Round 5 explorer data is precomputed and tracked in git
          # (round 5 CSVs are 38MB each, too large for the repo). Re-run
          # build_round5_data.py locally and commit if CSVs change.
          cp .github/round5_data.json "$DEPLOY_DIR/round5_data.json"
          cp .github/shared.css "$DEPLOY_DIR/shared.css"
          cp .github/shared.js "$DEPLOY_DIR/shared.js"

          # Skip Jekyll — serve files as-is. Cuts pages-build-deployment
          # from minutes to seconds on a multi-thousand-file tree.
          touch "$DEPLOY_DIR/.nojekyll"

          # Push to gh-pages
          cd "$DEPLOY_DIR"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit -m "Results: ${{ github.actor }} @ ${{ github.sha }}"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push -f origin gh-pages
